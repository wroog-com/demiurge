version: 2

project_name: demi

before:
  hooks:
    - go mod tidy

builds:
  - id: demi
    binary: demi
    main: ./cmd/demi
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/wroog-com/demiurge/internal/build.Version={{.Version}} -X github.com/wroog-com/demiurge/internal/build.Date={{time "2006-01-02"}}

archives:
  - ids: [demi]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - zip

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: demi
    repository:
      owner: wroog-com
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/wroog-com/demiurge"
    description: "Project maintenance tool for developers"
    binaries:
      - demi
